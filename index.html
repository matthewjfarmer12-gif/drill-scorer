<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Drill Scorer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #f4f4f6;
    --card: #ffffff;
    --ink: #1c1c1e;
    --muted: #8e8e93;
    --accent: #8C1515;
    --accent-soft: #f6e9e9;
    --green: #1f8a3b;
    --green-soft: #e7f4ea;
    --red: #c0392b;
    --red-soft: #f9e9e7;
    --line: #e4e4e8;
    --radius: 16px;
  }
  /* touch-action:manipulation disables iOS double-tap zoom, which otherwise
     swallows the second of two quick taps (e.g. name -> score button) */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; -webkit-touch-callout: none; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
  }
  input { -webkit-user-select: text; user-select: text; }

  .screen { display: none; min-height: 100%; padding: calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 96px); max-width: 560px; margin: 0 auto; }
  .screen.active { display: block; }

  h1 { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 15px; margin-bottom: 20px; }
  h2 { font-size: 17px; font-weight: 700; margin: 22px 0 10px; }

  .btn {
    display: block; width: 100%; border: none; border-radius: var(--radius);
    padding: 16px; font-size: 17px; font-weight: 700; font-family: inherit;
    cursor: pointer; text-align: center;
  }
  .btn:active { opacity: .75; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--card); color: var(--accent); border: 1.5px solid var(--line); }
  .btn-danger { background: var(--red-soft); color: var(--red); }
  .btn + .btn { margin-top: 10px; }
  .btn:disabled { opacity: .35; }

  .card {
    background: var(--card); border-radius: var(--radius); padding: 14px 16px;
    margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,.05);
  }

  /* Drill list */
  .drill-row { display: flex; align-items: center; gap: 12px; cursor: pointer; }
  .drill-row:active { opacity: .7; }
  .drill-info { flex: 1; min-width: 0; }
  .drill-name { font-size: 17px; font-weight: 700; }
  .drill-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  .chip {
    font-size: 13px; font-weight: 700; padding: 3px 9px; border-radius: 999px;
  }
  .chip.pos { background: var(--green-soft); color: var(--green); }
  .chip.neg { background: var(--red-soft); color: var(--red); }
  .icon-btn {
    flex: none; width: 40px; height: 40px; border-radius: 12px; border: none;
    background: var(--bg); color: var(--muted); font-size: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-family: inherit;
  }
  .icon-btn:active { opacity: .6; }

  .empty { text-align: center; color: var(--muted); font-size: 15px; padding: 28px 12px; }

  /* Forms */
  .field-label { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin: 18px 0 8px; }
  input[type=text], input[type=number], input[type=tel] {
    width: 100%; border: 1.5px solid var(--line); border-radius: 12px;
    padding: 13px 14px; font-size: 17px; font-family: inherit; background: var(--card); color: var(--ink);
  }
  input:focus { outline: none; border-color: var(--accent); }
  .player-input { margin-bottom: 8px; }

  .preset-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .preset {
    border: 1.5px solid var(--line); background: var(--card); border-radius: 999px;
    padding: 9px 14px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer;
  }
  .preset.pos { color: var(--green); }
  .preset.neg { color: var(--red); }
  .preset:active { background: var(--bg); }

  .selected-buttons { display: flex; flex-wrap: wrap; gap: 8px; min-height: 42px; }
  .sel-chip {
    display: flex; align-items: center; gap: 7px; border-radius: 999px;
    padding: 8px 8px 8px 14px; font-size: 16px; font-weight: 800; border: none; font-family: inherit; cursor: pointer;
  }
  .sel-chip.pos { background: var(--green-soft); color: var(--green); }
  .sel-chip.neg { background: var(--red-soft); color: var(--red); }
  .sel-chip .x { font-weight: 400; font-size: 14px; opacity: .7; background: rgba(0,0,0,.07); border-radius: 999px; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }

  .custom-row { display: flex; gap: 8px; margin-top: 10px; }
  .custom-row input { flex: 1; min-width: 0; }
  .custom-row .btn { width: auto; padding: 13px 18px; margin: 0; font-size: 16px; }
  .sign-toggle {
    flex: none; width: 54px; border: 1.5px solid var(--line); border-radius: 12px;
    background: var(--card); font-size: 24px; font-weight: 800; font-family: inherit; cursor: pointer;
  }
  .sign-toggle.pos { color: var(--green); }
  .sign-toggle.neg { color: var(--red); border-color: var(--red); background: var(--red-soft); }
  .sign-toggle:active { opacity: .6; }

  /* Live screen */
  .live-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
  .live-title { font-size: 21px; font-weight: 800; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pill-btn {
    border: none; border-radius: 999px; padding: 9px 16px; font-size: 15px; font-weight: 700;
    font-family: inherit; cursor: pointer; flex: none;
  }
  .pill-undo { background: var(--card); color: var(--ink); border: 1.5px solid var(--line); }
  .pill-end { background: var(--accent); color: #fff; }
  .pill-btn:active { opacity: .7; }
  .pill-btn:disabled { opacity: .35; }

  .players-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .players-grid.single { grid-template-columns: 1fr; }
  .player-card { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,.05); }
  .player-top {
    width: 100%; border: none; background: none; font-family: inherit; cursor: pointer;
    padding: 14px 10px 10px; text-align: center;
  }
  .player-top:active { background: var(--accent-soft); }
  .player-name { font-size: 16px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .player-score { font-size: 38px; font-weight: 800; line-height: 1.1; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .player-score.neg { color: var(--red); }
  .tap-hint { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .rep-row { display: flex; align-items: stretch; border-top: 1.5px solid var(--line); background: var(--bg); }
  .rep-mid {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
    font-size: 14px; font-weight: 700; color: var(--ink); padding: 12px 4px;
  }
  .rep-count { font-size: 20px; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; }
  .rep-adj {
    flex: none; width: 52px; border: none; background: none; font-family: inherit; cursor: pointer;
    font-size: 24px; font-weight: 800; padding: 10px 0;
  }
  .rep-adj.minus { color: var(--red); border-right: 1.5px solid var(--line); }
  .rep-adj.plus { color: var(--green); border-left: 1.5px solid var(--line); }
  .rep-adj:active { background: var(--accent-soft); }

  /* Shot clock panel */
  .clock-card {
    background: #1c1c1e; border-radius: var(--radius); padding: 12px 14px;
    margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px;
  }
  .clock-top { display: flex; align-items: center; gap: 8px; }
  .clock-dot { width: 9px; height: 9px; border-radius: 50%; background: #c0392b; flex: none; }
  .clock-dot.on { background: #2ecc71; }
  .clock-lbl { font-size: 12px; font-weight: 800; letter-spacing: .06em; color: #8e8e93; }
  .clock-status { font-size: 12px; color: #8e8e93; flex: 1; }
  .clock-secs {
    font-size: 36px; font-weight: 800; color: #f1c40f; line-height: 1;
    font-variant-numeric: tabular-nums; min-width: 58px; text-align: right;
  }
  .clock-btns { display: flex; gap: 8px; }
  .cbtn {
    border: none; border-radius: 10px; padding: 13px 0; font-family: inherit;
    font-weight: 800; font-size: 14px; cursor: pointer; flex: 1; color: #fff;
  }
  .cbtn:active { opacity: .65; }
  .cbtn-start { background: var(--green); }
  .cbtn-stop { background: var(--red); }
  .cbtn-reset { background: #2c2c2e; border: 1px solid #48484a; }
  .cbtn-rand { background: var(--accent); }
  .cbtn-gear { flex: none; width: 46px; background: #2c2c2e; border: 1px solid #48484a; font-size: 16px; }
  .clock-settings { display: none; align-items: center; gap: 8px; color: #d1d1d6; font-size: 14px; font-weight: 600; flex-wrap: wrap; }
  .clock-settings.open { display: flex; }
  .clock-settings input {
    width: 60px; background: #2c2c2e; border: 1px solid #48484a; color: #fff;
    border-radius: 8px; padding: 9px 4px; font-size: 17px; text-align: center; font-family: inherit;
  }
  .clock-settings input:focus { border-color: #f1c40f; outline: none; }

  /* Score sheet */
  .sheet-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none;
    align-items: flex-end; justify-content: center; z-index: 50;
  }
  .sheet-backdrop.open { display: flex; }
  .sheet {
    background: var(--card); width: 100%; max-width: 560px;
    border-radius: 22px 22px 0 0; padding: 20px 20px calc(env(safe-area-inset-bottom) + 22px);
  }
  .sheet-title { font-size: 15px; color: var(--muted); font-weight: 600; text-align: center; }
  .sheet-player { font-size: 22px; font-weight: 800; text-align: center; margin: 2px 0 16px; }
  .sheet-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .score-btn {
    border: none; border-radius: 14px; padding: 20px 10px; font-size: 26px; font-weight: 800;
    font-family: inherit; cursor: pointer; font-variant-numeric: tabular-nums;
  }
  .score-btn.pos { background: var(--green-soft); color: var(--green); }
  .score-btn.neg { background: var(--red-soft); color: var(--red); }
  .score-btn:active { opacity: .6; }
  .sheet-cancel { margin-top: 14px; background: var(--bg); color: var(--muted); }

  /* History */
  .hist-row { cursor: pointer; }
  .hist-head { display: flex; align-items: center; gap: 10px; }
  .hist-info { flex: 1; min-width: 0; }
  .hist-name { font-size: 16px; font-weight: 700; }
  .hist-date { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .hist-table { width: 100%; margin-top: 12px; border-top: 1px solid var(--line); padding-top: 8px; display: none; }
  .hist-row.open .hist-table { display: table; }
  .hist-table td, .hist-table th { padding: 6px 4px; font-size: 15px; text-align: left; }
  .hist-table th { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; font-weight: 700; }
  .hist-table td.num { text-align: right; font-weight: 700; font-variant-numeric: tabular-nums; }
  .hist-table th.num { text-align: right; }

  /* Summary */
  .summary-table { width: 100%; }
  .summary-table td, .summary-table th { padding: 12px 6px; font-size: 17px; text-align: left; border-bottom: 1px solid var(--line); }
  .summary-table tr:last-child td { border-bottom: none; }
  .summary-table th { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  .summary-table .num { text-align: right; font-weight: 800; font-variant-numeric: tabular-nums; }
  .medal { margin-right: 6px; }

  /* Tabs */
  .tabbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
    background: var(--card); border-top: 1.5px solid var(--line);
    display: flex; padding-bottom: env(safe-area-inset-bottom);
  }
  .tabbar.hidden { display: none; }
  .tab {
    flex: 1; border: none; background: none; font-family: inherit; cursor: pointer;
    padding: 12px 0 10px; font-size: 13px; font-weight: 700; color: var(--muted);
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .tab .glyph { font-size: 22px; line-height: 1; }
  .tab.active { color: var(--accent); }

  .back-link { background: none; border: none; color: var(--accent); font-size: 17px; font-weight: 600; font-family: inherit; cursor: pointer; padding: 0; margin-bottom: 14px; }

  /* Confirm dialog */
  .confirm-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none;
    align-items: center; justify-content: center; z-index: 70; padding: 24px;
  }
  .confirm-backdrop.open { display: flex; }
  .confirm-box { background: var(--card); border-radius: 18px; padding: 22px 20px; width: 100%; max-width: 340px; }
  .confirm-msg { font-size: 17px; font-weight: 600; text-align: center; margin-bottom: 18px; line-height: 1.4; }
  .confirm-actions { display: flex; gap: 10px; }
  .confirm-actions .btn { margin: 0; flex: 1; padding: 14px; font-size: 16px; }

  .toast {
    position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom) + 110px); transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 10px 18px; border-radius: 999px;
    font-size: 15px; font-weight: 600; opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 60;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- HOME / DRILLS -->
<div class="screen active" id="screen-home">
  <h1>Drill Scorer</h1>
  <div class="subtitle">Pick a drill to start, or make a new one.</div>
  <button class="btn btn-primary" onclick="openSetup()">＋ New Drill</button>
  <h2>My Drills</h2>
  <div id="drill-list"></div>
</div>

<!-- HISTORY -->
<div class="screen" id="screen-history">
  <h1>History</h1>
  <div class="subtitle">Past drills saved on this phone.</div>
  <div id="history-list"></div>
</div>

<!-- DRILL SETUP -->
<div class="screen" id="screen-setup">
  <button class="back-link" onclick="showScreen('home')">‹ Back</button>
  <h1 id="setup-title">New Drill</h1>
  <div class="field-label">Drill name</div>
  <input type="text" id="setup-name" placeholder="e.g. 5m Shooting" maxlength="40">
  <div class="field-label">Score buttons for this drill</div>
  <div class="selected-buttons" id="setup-chips"></div>
  <div class="field-label" style="margin-top:14px">Tap to add</div>
  <div class="preset-row" id="preset-row"></div>
  <div class="custom-row">
    <button class="sign-toggle pos" id="sign-toggle" onclick="toggleSign()" aria-label="Switch between plus and minus">＋</button>
    <input type="tel" id="custom-value" placeholder="Custom, e.g. 4" inputmode="numeric" pattern="[0-9]*">
    <button class="btn btn-secondary" onclick="addCustomButton()">Add</button>
  </div>
  <div style="height:24px"></div>
  <button class="btn btn-primary" onclick="saveDrill()">Save Drill</button>
</div>

<!-- PLAYER ENTRY -->
<div class="screen" id="screen-players">
  <button class="back-link" onclick="showScreen('home')">‹ Back</button>
  <h1 id="players-title">Who's in?</h1>
  <div class="subtitle">Enter 1–6 player names.</div>
  <div id="player-inputs"></div>
  <div style="height:16px"></div>
  <button class="btn btn-primary" onclick="startDrill()">Start Drill</button>
</div>

<!-- LIVE DRILL -->
<div class="screen" id="screen-live">
  <div class="live-header">
    <div class="live-title" id="live-title"></div>
    <button class="pill-btn pill-undo" id="undo-btn" onclick="undo()">↩ Undo</button>
    <button class="pill-btn pill-end" onclick="endDrill()">End</button>
  </div>
  <div class="clock-card">
    <div class="clock-top">
      <span class="clock-dot" id="clock-dot"></span>
      <span class="clock-lbl">SHOT CLOCK</span>
      <span class="clock-status" id="clock-status">connecting…</span>
      <span class="clock-secs" id="clock-secs">–</span>
    </div>
    <div class="clock-btns">
      <button class="cbtn cbtn-start" id="clock-toggle" onclick="clockCmd('toggle')">START</button>
      <button class="cbtn cbtn-reset" onclick="clockCmd('shot30')">30</button>
      <button class="cbtn cbtn-rand" id="clock-rand" onclick="clockRandom()">🎲 10–20</button>
      <button class="cbtn cbtn-gear" onclick="document.getElementById('clock-settings').classList.toggle('open')">⚙</button>
    </div>
    <div class="clock-settings" id="clock-settings">
      Random between
      <input type="tel" id="rand-min" inputmode="numeric" onchange="saveRandWindow()">
      and
      <input type="tel" id="rand-max" inputmode="numeric" onchange="saveRandWindow()">
      seconds
    </div>
  </div>
  <div class="players-grid" id="live-grid"></div>
</div>

<!-- SUMMARY -->
<div class="screen" id="screen-summary">
  <h1>Drill Complete</h1>
  <div class="subtitle" id="summary-sub"></div>
  <div class="card"><table class="summary-table" id="summary-table"></table></div>
  <div style="height:10px"></div>
  <button class="btn btn-primary" onclick="showScreen('home')">Done</button>
</div>

<!-- SCORE SHEET -->
<div class="sheet-backdrop" id="sheet" onclick="if(event.target===this)closeSheet()">
  <div class="sheet">
    <div class="sheet-title">Add score for</div>
    <div class="sheet-player" id="sheet-player"></div>
    <div class="sheet-buttons" id="sheet-buttons"></div>
    <button class="btn sheet-cancel" onclick="closeSheet()">Cancel</button>
  </div>
</div>

<!-- TABS -->
<div class="tabbar" id="tabbar">
  <button class="tab active" id="tab-home" onclick="showScreen('home')"><span class="glyph">🏆</span>Drills</button>
  <button class="tab" id="tab-history" onclick="showScreen('history')"><span class="glyph">🕘</span>History</button>
</div>

<!-- CONFIRM DIALOG -->
<div class="confirm-backdrop" id="confirm">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-actions">
      <button class="btn btn-secondary" id="confirm-no">Cancel</button>
      <button class="btn btn-primary" id="confirm-yes">Yes</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ---------- storage ----------
function load(key, fallback) {
  try { const v = JSON.parse(localStorage.getItem(key)); return v === null || v === undefined ? fallback : v; }
  catch (e) { return fallback; }
}
function save(key, value) { localStorage.setItem(key, JSON.stringify(value)); }

let drills  = load('ds.drills', []);    // [{id, name, buttons:[5,3,-2]}]
let history = load('ds.history', []);   // [{id, drillName, endedAt, players:[{name,score,reps}]}]
let session = load('ds.session', null); // {drillId, drillName, buttons, players:[{name,score,reps}], undo:[]}

const PRESETS = [1, 2, 3, 5, -1, -2, -3, -5];

// ---------- helpers ----------
const $ = id => document.getElementById(id);
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtSigned(n) { return n > 0 ? '+' + n : String(n); }
function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => t.classList.remove('show'), 1400);
}

// ---------- confirm dialog ----------
let confirmYesFn = null;
function askConfirm(message, yesLabel, onYes) {
  $('confirm-msg').textContent = message;
  $('confirm-yes').textContent = yesLabel;
  confirmYesFn = onYes;
  $('confirm').classList.add('open');
}
$('confirm-no').onclick = () => { $('confirm').classList.remove('open'); confirmYesFn = null; };
$('confirm-yes').onclick = () => {
  $('confirm').classList.remove('open');
  const fn = confirmYesFn;
  confirmYesFn = null;
  if (fn) fn();
};

// ---------- navigation ----------
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $('screen-' + name).classList.add('active');
  const tabbar = $('tabbar');
  tabbar.classList.toggle('hidden', name === 'live' || name === 'setup' || name === 'players');
  $('tab-home').classList.toggle('active', name === 'home' || name === 'summary');
  $('tab-history').classList.toggle('active', name === 'history');
  if (name === 'home') renderDrillList();
  if (name === 'history') renderHistory();
  window.scrollTo(0, 0);
}

// ---------- home / drill list ----------
function renderDrillList() {
  const el = $('drill-list');
  if (!drills.length) {
    el.innerHTML = '<div class="card empty">No drills yet.<br>Tap “New Drill” to set one up.</div>';
    return;
  }
  el.innerHTML = drills.map(d => `
    <div class="card drill-row" onclick="openPlayers('${d.id}')">
      <div class="drill-info">
        <div class="drill-name">${esc(d.name)}</div>
        <div class="drill-chips">${d.buttons.map(b =>
          `<span class="chip ${b >= 0 ? 'pos' : 'neg'}">${fmtSigned(b)}</span>`).join('')}</div>
      </div>
      <button class="icon-btn" onclick="event.stopPropagation();openSetup('${d.id}')" aria-label="Edit drill">✎</button>
      <button class="icon-btn" onclick="event.stopPropagation();deleteDrill('${d.id}')" aria-label="Delete drill">🗑</button>
    </div>`).join('');
}

function deleteDrill(id) {
  const d = drills.find(x => x.id === id);
  if (!d) return;
  askConfirm('Delete drill “' + d.name + '”? Past results in History are kept.', 'Delete', () => {
    drills = drills.filter(x => x.id !== id);
    save('ds.drills', drills);
    renderDrillList();
  });
}

// ---------- drill setup ----------
let setupButtons = [];
let editingId = null;

function openSetup(id) {
  editingId = id || null;
  const existing = id ? drills.find(d => d.id === id) : null;
  setupButtons = existing ? existing.buttons.slice() : [];
  $('setup-title').textContent = existing ? 'Edit Drill' : 'New Drill';
  $('setup-name').value = existing ? existing.name : '';
  $('custom-value').value = '';
  if (customSign < 0) toggleSign(); // reset to ＋
  renderPresets();
  renderSetupChips();
  showScreen('setup');
}

function renderPresets() {
  $('preset-row').innerHTML = PRESETS.map(v =>
    `<button class="preset ${v >= 0 ? 'pos' : 'neg'}" onclick="addButton(${v})">${fmtSigned(v)}</button>`).join('');
}

function renderSetupChips() {
  const el = $('setup-chips');
  if (!setupButtons.length) {
    el.innerHTML = '<span style="color:var(--muted);font-size:15px;align-self:center">None yet — add some below.</span>';
    return;
  }
  el.innerHTML = setupButtons.map((b, i) =>
    `<button class="sel-chip ${b >= 0 ? 'pos' : 'neg'}" onclick="removeButton(${i})">${fmtSigned(b)}<span class="x">✕</span></button>`).join('');
}

function addButton(v) {
  if (setupButtons.includes(v)) { toast(fmtSigned(v) + ' is already added'); return; }
  if (setupButtons.length >= 8) { toast('Max 8 buttons per drill'); return; }
  setupButtons.push(v);
  setupButtons.sort((a, b) => b - a);
  renderSetupChips();
}

function removeButton(i) { setupButtons.splice(i, 1); renderSetupChips(); }

let customSign = 1;
function toggleSign() {
  customSign = -customSign;
  const t = $('sign-toggle');
  t.textContent = customSign > 0 ? '＋' : '−';
  t.classList.toggle('pos', customSign > 0);
  t.classList.toggle('neg', customSign < 0);
}

function addCustomButton() {
  const raw = $('custom-value').value.trim();
  const typedMinus = raw.startsWith('-'); // a typed minus (e.g. desktop keyboard) still wins
  const n = parseInt(raw.replace(/[^0-9]/g, ''), 10);
  if (!raw || isNaN(n) || n === 0 || n > 99) { toast('Enter a number from 1 to 99'); return; }
  $('custom-value').value = '';
  addButton((typedMinus ? -1 : customSign) * n);
}

function saveDrill() {
  const name = $('setup-name').value.trim();
  if (!name) { toast('Give the drill a name'); return; }
  if (!setupButtons.length) { toast('Add at least one score button'); return; }
  if (editingId) {
    const d = drills.find(x => x.id === editingId);
    d.name = name;
    d.buttons = setupButtons.slice();
  } else {
    drills.unshift({ id: 'd' + Date.now(), name, buttons: setupButtons.slice() });
  }
  save('ds.drills', drills);
  showScreen('home');
  toast('Drill saved');
}

// ---------- player entry ----------
let pendingDrillId = null;

function openPlayers(id) {
  const d = drills.find(x => x.id === id);
  if (!d) return;
  pendingDrillId = id;
  $('players-title').textContent = d.name;
  $('player-inputs').innerHTML = Array.from({ length: 6 }, (_, i) =>
    `<input type="text" class="player-input" id="pname-${i}" placeholder="Player ${i + 1}${i === 0 ? '' : ' (optional)'}" maxlength="24" autocomplete="off">`).join('');
  showScreen('players');
}

function startDrill() {
  const d = drills.find(x => x.id === pendingDrillId);
  if (!d) return;
  const names = [];
  for (let i = 0; i < 6; i++) {
    const v = $('pname-' + i).value.trim();
    if (v) names.push(v);
  }
  if (!names.length) { toast('Enter at least one player'); return; }
  session = {
    drillId: d.id,
    drillName: d.name,
    buttons: d.buttons.slice(),
    startedAt: Date.now(),
    players: names.map(n => ({ name: n, score: 0, reps: 0 })),
    undo: []
  };
  save('ds.session', session);
  openLive();
}

// ---------- shot clock remote (Stanford Scout Hub clock) ----------
// The pool scoreboard (smwphub.com/tools/swim-waterpolo.html) syncs displays,
// TVs, and remotes over a Supabase Realtime broadcast channel. The display
// page is the engine: remotes broadcast 'cmd', the display executes and
// broadcasts 'state' back. This panel is just another remote.
const SB_URL = 'https://mtkovmvsqxollwnkevti.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10a292bXZzcXhvbGx3bmtldnRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3ODIzMTgsImV4cCI6MjA4NzM1ODMxOH0.zEHkmYW3Ake_wVs2ODTIj10cva3-Spmej-JRMB_RL_w';
const SB_CHANNEL = 'wp-scoreboard';

let sbClient = null;
let sbChannel = null;
let clockReady = false;        // subscribed to the broadcast channel
let clockLastState = 0;        // last time the display broadcast its state
let clockRunning = false;
let clockStarted = false;

function clockConnect() {
  if (clockStarted) return;
  clockStarted = true;
  connectClockChannel();
}

function connectClockChannel() {
  try {
    if (!window.supabase) { setTimeout(connectClockChannel, 1500); return; }
    if (!sbClient) sbClient = window.supabase.createClient(SB_URL, SB_KEY);
    if (sbChannel) { try { sbClient.removeChannel(sbChannel); } catch (e) {} }
    sbChannel = sbClient.channel(SB_CHANNEL, { config: { broadcast: { self: false } } });
    sbChannel
      .on('broadcast', { event: 'state' }, (payload) => {
        const s = payload.payload || {};
        clockLastState = performance.now();
        clockRunning = !!s.running;
        $('clock-secs').textContent = Math.max(0, Math.ceil((s.shotTime || 0) / 1000));
        const b = $('clock-toggle');
        b.textContent = clockRunning ? 'STOP' : 'START';
        b.className = 'cbtn ' + (clockRunning ? 'cbtn-stop' : 'cbtn-start');
        renderClockConn();
      })
      .subscribe((status) => {
        clockReady = (status === 'SUBSCRIBED');
        renderClockConn();
        // supabase-js auto-reconnects most drops; force a clean rejoin on
        // terminal states so a flaky pool network can't strand us
        if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
          setTimeout(() => { if (!clockReady) connectClockChannel(); }, 2500);
        }
      });
  } catch (e) {
    setTimeout(connectClockChannel, 3000);
  }
}

function renderClockConn() {
  // The display heartbeats state every 1s; silence >6s means no display is up
  const displayUp = clockLastState && (performance.now() - clockLastState < 6000);
  $('clock-dot').classList.toggle('on', clockReady && displayUp);
  $('clock-status').textContent = !clockReady ? 'connecting…'
    : displayUp ? 'connected'
    : 'no clock display open';
  if (!displayUp) $('clock-secs').textContent = '–';
}
setInterval(renderClockConn, 2000);

function clockCmd(action, data) {
  if (!clockReady) { toast('Shot clock not connected'); return; }
  sbChannel.send({ type: 'broadcast', event: 'cmd', payload: { action: action, data: data || {} } });
}

function getRandWindow() {
  const w = load('ds.randwin', { min: 10, max: 20 });
  return { min: w.min, max: w.max };
}

function clockRandom() {
  const w = getRandWindow();
  const secs = w.min + Math.floor(Math.random() * (w.max - w.min + 1));
  clockCmd('setShot', { ms: secs * 1000 });
  if (clockReady) toast('Shot clock → ' + secs + 's');
}

function saveRandWindow() {
  let min = parseInt($('rand-min').value, 10);
  let max = parseInt($('rand-max').value, 10);
  if (isNaN(min) || min < 1) min = 1;
  if (isNaN(max) || max < 1) max = 1;
  min = Math.min(min, 30); max = Math.min(max, 30);
  if (min > max) { const t = min; min = max; max = t; }
  save('ds.randwin', { min, max });
  renderRandWindow();
}

function renderRandWindow() {
  const w = getRandWindow();
  $('rand-min').value = w.min;
  $('rand-max').value = w.max;
  $('clock-rand').textContent = '🎲 ' + w.min + '–' + w.max;
}

// ---------- live drill ----------
function openLive() {
  $('live-title').textContent = session.drillName;
  renderRandWindow();
  clockConnect();
  renderLive();
  showScreen('live');
}

function renderLive() {
  const grid = $('live-grid');
  grid.classList.toggle('single', session.players.length === 1);
  grid.innerHTML = session.players.map((p, i) => `
    <div class="player-card">
      <button class="player-top" onclick="openSheet(${i})">
        <div class="player-name">${esc(p.name)}</div>
        <div class="player-score ${p.score < 0 ? 'neg' : ''}">${p.score}</div>
        <div class="tap-hint">tap to score</div>
      </button>
      <div class="rep-row">
        <button class="rep-adj minus" onclick="addRep(${i},-1)" aria-label="Subtract rep">−</button>
        <div class="rep-mid">Reps <span class="rep-count">${p.reps}</span></div>
        <button class="rep-adj plus" onclick="addRep(${i},1)" aria-label="Add rep">＋</button>
      </div>
    </div>`).join('');
  $('undo-btn').disabled = !session.undo.length;
}

function addRep(i, delta) {
  const p = session.players[i];
  if (delta < 0 && p.reps === 0) return; // nothing to subtract
  p.reps += delta;
  session.undo.push({ p: i, type: 'rep', delta });
  save('ds.session', session);
  renderLive();
}

let sheetPlayer = null;
function openSheet(i) {
  sheetPlayer = i;
  $('sheet-player').textContent = session.players[i].name;
  $('sheet-buttons').innerHTML = session.buttons.map(b =>
    `<button class="score-btn ${b >= 0 ? 'pos' : 'neg'}" onclick="applyScore(${b})">${fmtSigned(b)}</button>`).join('');
  $('sheet').classList.add('open');
}
function closeSheet() { $('sheet').classList.remove('open'); sheetPlayer = null; }

function applyScore(v) {
  if (sheetPlayer === null) return;
  const p = session.players[sheetPlayer];
  p.score += v;
  session.undo.push({ p: sheetPlayer, type: 'score', value: v });
  save('ds.session', session);
  closeSheet();
  renderLive();
  toast(fmtSigned(v) + ' ' + p.name);
}

function undo() {
  const last = session.undo.pop();
  if (!last) return;
  const p = session.players[last.p];
  if (last.type === 'rep') { p.reps = Math.max(0, p.reps - (last.delta || 1)); toast('Undid rep for ' + p.name); }
  else { p.score -= last.value; toast('Undid ' + fmtSigned(last.value) + ' for ' + p.name); }
  save('ds.session', session);
  renderLive();
}

function endDrill() {
  askConfirm('End this drill and save the results?', 'End & Save', () => {
    const entry = {
      id: 'h' + Date.now(),
      drillName: session.drillName,
      endedAt: Date.now(),
      players: session.players.map(p => ({ name: p.name, score: p.score, reps: p.reps }))
    };
    history.unshift(entry);
    save('ds.history', history);
    session = null;
    save('ds.session', null);
    showSummary(entry);
  });
}

// ---------- summary ----------
function showSummary(entry) {
  $('summary-sub').textContent = entry.drillName + ' · ' + new Date(entry.endedAt).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
  const ranked = entry.players.slice().sort((a, b) => b.score - a.score);
  const medals = ['🥇', '🥈', '🥉'];
  $('summary-table').innerHTML =
    '<tr><th>Player</th><th class="num">Score</th><th class="num">Reps</th></tr>' +
    ranked.map((p, i) =>
      `<tr><td><span class="medal">${medals[i] || ''}</span>${esc(p.name)}</td><td class="num">${p.score}</td><td class="num">${p.reps}</td></tr>`).join('');
  showScreen('summary');
}

// ---------- history ----------
function renderHistory() {
  const el = $('history-list');
  if (!history.length) {
    el.innerHTML = '<div class="card empty">No drills finished yet.<br>Results show up here after you end a drill.</div>';
    return;
  }
  el.innerHTML = history.map(h => {
    const ranked = h.players.slice().sort((a, b) => b.score - a.score);
    return `
    <div class="card hist-row" id="hist-${h.id}" onclick="toggleHist('${h.id}')">
      <div class="hist-head">
        <div class="hist-info">
          <div class="hist-name">${esc(h.drillName)}</div>
          <div class="hist-date">${new Date(h.endedAt).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' })} · ${h.players.length} player${h.players.length > 1 ? 's' : ''}</div>
        </div>
        <button class="icon-btn" onclick="event.stopPropagation();deleteHist('${h.id}')" aria-label="Delete result">🗑</button>
      </div>
      <table class="hist-table">
        <tr><th>Player</th><th class="num">Score</th><th class="num">Reps</th></tr>
        ${ranked.map(p => `<tr><td>${esc(p.name)}</td><td class="num">${p.score}</td><td class="num">${p.reps}</td></tr>`).join('')}
      </table>
    </div>`;
  }).join('');
}

function toggleHist(id) { $('hist-' + id).classList.toggle('open'); }

function deleteHist(id) {
  askConfirm('Delete this result?', 'Delete', () => {
    history = history.filter(h => h.id !== id);
    save('ds.history', history);
    renderHistory();
  });
}

// ---------- boot ----------
if (session && session.players && session.players.length) {
  openLive(); // resume an unfinished drill (e.g. after accidental refresh)
} else {
  session = null;
  showScreen('home');
}
</script>
